server {
    listen 443 ssl;
    server_name bzserv.tail0119192.ts.net;

    # SSL certificates (generated by Certbot or Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/bzserv.tail0119192.ts.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bzserv.tail0119192.ts.net/privkey.pem;

    # API Proxy
    location /api/ {
        proxy_pass http://100.64.144.126:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Neo4j Browser Proxy
    location /neo4j/ {
        proxy_pass http://100.64.144.126:7474/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebDAV
    location /vault/ {
        alias /opt/knowledge-vault/;
        dav_methods put mkdir copy move;
        dav_access user:rw group:rw all:rw;
        autoindex off;
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd.vault;
    }
}
